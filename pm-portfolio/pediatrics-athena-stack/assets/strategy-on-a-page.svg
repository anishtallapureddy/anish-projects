<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460" font-family="Segoe UI, Helvetica, Arial, sans-serif"><rect width="1100" height="460" rx="14" fill="#f6f8fa"/><text x="40" y="50" font-size="26" font-weight="700" fill="#0d1117" text-anchor="start">Strategy on a Page &#8212; 3 Horizons</text><rect x="40" y="80" width="320" height="340" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" opacity="1"/><rect x="40" y="80" width="320" height="8" rx="0" fill="#238636" opacity="1"/><text x="58" y="118" font-size="16" font-weight="700" fill="#238636" text-anchor="start">HORIZON 1 &#8212; LAUNCH</text><text x="58" y="140" font-size="12.5" font-weight="400" fill="#57606a" text-anchor="start">Months 0-12 &#8226; Solo &#8594; 2 providers</text><circle cx="64" cy="168" r="3.5" fill="#238636"/><text x="78" y="172" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Go live on Athena-Lean in 6-8 wks</text><circle cx="64" cy="195" r="3.5" fill="#238636"/><text x="78" y="199" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Drive FPAR &#8805;95%, Days-in-AR &lt;30</text><circle cx="64" cy="222" r="3.5" fill="#238636"/><text x="78" y="226" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Build review engine &#8594; #1 local rank</text><circle cx="64" cy="249" r="3.5" fill="#238636"/><text x="78" y="253" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Self-supervise billing 30 min/day</text><circle cx="64" cy="276" r="3.5" fill="#238636"/><text x="78" y="280" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Hire provider #2 by EOY1</text><circle cx="64" cy="303" r="3.5" fill="#238636"/><text x="78" y="307" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Cash buffer: 90-120 days operating</text><rect x="400" y="80" width="320" height="340" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" opacity="1"/><rect x="400" y="80" width="320" height="8" rx="0" fill="#1f6feb" opacity="1"/><text x="418" y="118" font-size="16" font-weight="700" fill="#1f6feb" text-anchor="start">HORIZON 2 &#8212; SCALE</text><text x="418" y="140" font-size="12.5" font-weight="400" fill="#57606a" text-anchor="start">Year 2 &#8226; 3-4 providers / 2 locations</text><circle cx="424" cy="168" r="3.5" fill="#1f6feb"/><text x="438" y="172" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Open location #2 (Athena dropdown)</text><circle cx="424" cy="195" r="3.5" fill="#1f6feb"/><text x="438" y="199" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Negotiate Athena rate &#8594; ~4% (Mo 9 hammer)</text><circle cx="424" cy="222" r="3.5" fill="#1f6feb"/><text x="438" y="226" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Add part-time ops coordinator</text><circle cx="424" cy="249" r="3.5" fill="#1f6feb"/><text x="438" y="253" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Standardize SOPs across sites</text><circle cx="424" cy="276" r="3.5" fill="#1f6feb"/><text x="438" y="280" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Watch %-fee vs $200k/mo line</text><circle cx="424" cy="303" r="3.5" fill="#1f6feb"/><text x="438" y="307" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Protect margin as volume compounds</text><rect x="760" y="80" width="320" height="340" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5" opacity="1"/><rect x="760" y="80" width="320" height="8" rx="0" fill="#8957e5" opacity="1"/><text x="778" y="118" font-size="16" font-weight="700" fill="#8957e5" text-anchor="start">HORIZON 3 &#8212; OPTIMIZE</text><text x="778" y="140" font-size="12.5" font-weight="400" fill="#57606a" text-anchor="start">Year 3+ &#8226; >$200k/mo collections</text><circle cx="784" cy="168" r="3.5" fill="#8957e5"/><text x="798" y="172" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Hit the tipping point deliberately</text><circle cx="784" cy="195" r="3.5" fill="#8957e5"/><text x="798" y="199" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Migrate to flat-fee EHR + in-house biller</text><circle cx="784" cy="222" r="3.5" fill="#8957e5"/><text x="798" y="226" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Keep RCM margin in-house</text><circle cx="784" cy="249" r="3.5" fill="#8957e5"/><text x="798" y="253" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Evaluate ancillary revenue lines</text><circle cx="784" cy="276" r="3.5" fill="#8957e5"/><text x="798" y="280" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Consider valuation / partnership</text><circle cx="784" cy="303" r="3.5" fill="#8957e5"/><text x="798" y="307" font-size="12.5" font-weight="400" fill="#0d1117" text-anchor="start">Reinvest savings into growth</text><path d="M368,250 l22,0" stroke="#d0d7de" stroke-width="3" marker-end="url(#a2)"/><path d="M728,250 l22,0" stroke="#d0d7de" stroke-width="3" marker-end="url(#a2)"/><defs><marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#d0d7de"/></marker></defs></svg>