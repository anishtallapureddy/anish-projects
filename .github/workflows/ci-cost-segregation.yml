name: Cost Segregation CI

on:
  push:
    branches: [main]
    paths:
      - 'consumer/cost-segregation/**'
  pull_request:
    branches: [main]
    paths:
      - 'consumer/cost-segregation/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consumer/cost-segregation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: consumer/cost-segregation/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run lint
