name: AI Gateway CI

on:
  push:
    branches: [main]
    paths:
      - 'ai/ai-gateway/**'
  pull_request:
    branches: [main]
    paths:
      - 'ai/ai-gateway/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai/ai-gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai/ai-gateway/package-lock.json

      - run: npm ci
      - run: npm test
